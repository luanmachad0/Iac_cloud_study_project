version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportsbetting-api
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=sports_betting;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      AWS__SqsQueueUrl: ""
      Cors__AllowedOrigins__0: http://localhost:5173
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: sportsbetting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports_betting
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportsbetting-redis
    restart: unless-stopped

volumes:
  postgres_data:
