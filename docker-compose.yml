version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportsbetting-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=sports_betting;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      AWS__Region: us-east-1
      AWS__ServiceUrl: http://localstack:4566
      AWS__SqsQueueUrl: http://localstack:4566/000000000000/bets-events
    depends_on:
      - postgres
      - redis
      - localstack

  postgres:
    image: postgres:16
    container_name: sportsbetting-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports_betting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportsbetting-redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:3.8
    container_name: sportsbetting-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1

volumes:
  postgres_data:
