apiVersion: apps/v1
kind: Deployment
metadata:
  name: sportsbetting-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sportsbetting-api
  template:
    metadata:
      labels:
        app: sportsbetting-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/sportsbetting-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sportsbetting-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
